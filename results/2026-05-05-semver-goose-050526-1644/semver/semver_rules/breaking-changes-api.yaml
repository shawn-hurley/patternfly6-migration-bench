- ruleID: sd-modal-appendto-string-invalid
  labels:
  - source=semver-analyzer
  - change-type=prop-value-change
  - package=@patternfly/react-core
  effort: 1
  category: mandatory
  description: Modal appendTo prop may not accept string values
  message: |-
    Modal's portal rendering behavior changed. The appendTo prop may no longer accept string values like "inline" or "parent".

    Remove appendTo="inline" — the default portal behavior is sufficient in most cases. If you need specific portal targeting, use a function: appendTo={() => document.body}.
  when:
    frontend.referenced:
      pattern: ^appendTo$
      location: JSX_PROP
      component: ^Modal$
      value: ^(inline|parent)$
      from: '@patternfly/react-core'
